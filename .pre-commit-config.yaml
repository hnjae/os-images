---
default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
        fail_fast: true
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-xml
  - repo: local
    hooks:
      - id: yamlfmt
        name: format yaml
        entry: yamlfmt
        language: system
        types: [yaml]
      - id: taplo-format
        name: format toml
        entry: taplo format
        language: system
        types: [toml]
      - id: biome-format-json
        name: format json
        entry: biome format --write
        language: system
        files: \.(jsonc?)$
      - id: just-fmt
        name: format just
        entry: just --fmt --unstable --justfile
        language: system
        files: (^|/)(\.)?justfile$
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.58
    hooks:
      - id: rumdl-fmt
  - repo: local
    hooks:
      - id: shellharden
        name: harden shell
        entry: shellharden --replace
        language: system
        files: &shell_files |
          (?x)^(
            .*\.(sh|bash)$|
            \.envrc(\..+)?$|
            \.env(\..+)?$|
            \.profile$
          )
        stages: [pre-commit, pre-merge-commit, pre-push]
      - id: shellcheck
        name: check shell
        entry: shellcheck
        language: system
        files: *shell_files
        stages: [pre-commit, pre-merge-commit, pre-push]
      - id: shfmt
        name: format shell
        entry: shfmt --indent 4 --simplify --write
        language: system
        files: *shell_files
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.58
    hooks:
      - id: rumdl
        stages: [pre-merge-commit, pre-push]
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        stages: [pre-merge-commit, pre-push]
